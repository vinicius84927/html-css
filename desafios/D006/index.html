<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags html</title>
    <link rel="shortcut icon" href="../favicon - Copia.ico" type="image/x-icon">
</head>
<body>
    <h1>tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul>
        <li><abbr title="use a tag P"> Parágrafo</abbr></li>
        <li><abbr title="Use a tag H"> Titulo</abbr></li>
        <li><abbr title="Use a tag IMG"> Imagem</abbr></li>
        <li><abbr title="Use a tag ABBR"> Abreviação</abbr></li>
        <li><abbr title="Use a tag PRE"> codio-fonte</abbr></li>
        <li><abbr title="Use a tag OL">Lista numerada</abbr></li>
        <li><abbr title="Use a tag UL">Lista com demarcadores</abbr></li>
    </ul>
</body>
</html>
