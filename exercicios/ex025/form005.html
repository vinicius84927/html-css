<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <fieldset>
        <legend>Sexo</legend>
        <form action="cadastro.php" method="get" autocomplete="on">
            <p>
                <input type="radio" name="sexo" id="imas" value="M" checked><label for="imas">Masculino</label><br>
                <input type="radio" name="sexo" id="ifem" value="F"><label for="ifem">Feminino</label>
            </p>
        </form>
    </fieldset>
    <fieldset>
        <legend>Esportes favoritos</legend>
        <form action="cadastro.php" method="get" autocomplete="on">
            <p>
                <input type="checkbox" name="bas" id="ibas"><label for="ibas">Basquete</label>
                <input type="checkbox" name="fut" id="ifut" checked><label for="ifut">Futebol</label>
                <input type="checkbox" name="nat" id="inat"><label for="inat">Natação</label>
                <input type="checkbox" name="ten" id="iten"><label for="iten">Tênis</label>
            </p>
        </form>
    </fieldset>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
</html>
